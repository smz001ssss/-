<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📋 双模考试系统 · 练习/模拟</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .app-container {
      max-width: 1300px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
      padding: 24px 28px;
    }
    .auth-overlay {
      background: white;
      border-radius: 28px;
      padding: 40px 32px;
      text-align: center;
    }
    .auth-box { max-width: 400px; margin: 0 auto; }
    .auth-box h2 { font-weight: 600; color: #0f172a; margin-bottom: 24px; font-size: 28px; }
    .token-input {
      width: 100%; padding: 16px 20px; font-size: 18px;
      border: 2px solid #e2e8f0; border-radius: 60px; outline: none; text-align: center;
    }
    .token-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
    .auth-btn {
      margin-top: 24px; background: #0f172a; color: white; border: none; font-weight: 600;
      padding: 16px 28px; font-size: 18px; border-radius: 60px; width: 100%; cursor: pointer;
    }
    .hint-token { margin-top: 16px; color: #64748b; }
    .main-panel { display: block; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    h1 { font-size: 26px; font-weight: 650; color: #0b1e33; display: flex; align-items: center; gap: 8px; }
    .badge { background: #dbeafe; color: #1e4bd2; padding: 4px 12px; border-radius: 40px; font-size: 14px; }
    .logout-btn {
      background: none; border: 1.5px solid #cbd5e1; padding: 8px 20px;
      border-radius: 40px; font-weight: 500; cursor: pointer;
    }
    .mode-switch {
      display: flex; gap: 12px; margin-left: 20px;
    }
    .mode-btn {
      background: white; border: 1.5px solid #cbd5e1; padding: 8px 20px;
      border-radius: 40px; font-weight: 500; cursor: pointer;
    }
    .mode-btn.active {
      background: #0f172a; color: white; border-color: #0f172a;
    }
    .suite-manager {
      background: #f8fafc; border-radius: 24px; padding: 20px 24px;
      margin-bottom: 28px; border: 1px solid #eef2f6;
    }
    .suite-title {
      font-weight: 600; margin-bottom: 18px; color: #1e293b;
      display: flex; align-items: center; gap: 12px;
    }
    .suite-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .suite-card {
      background: white; border-radius: 20px; padding: 16px 14px;
      border: 1px solid #e2e8f0;
    }
    .suite-label { font-weight: 600; margin-bottom: 10px; }
    .upload-btn {
      background: #ffffff; border: 1.5px dashed #94a3b8; border-radius: 30px;
      padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
      text-align: center; display: inline-block; width: 100%;
    }
    .upload-btn:hover { border-color: #3b82f6; background: #f0f9ff; }
    .count-badge { background: #e6edfb; padding: 2px 10px; border-radius: 30px; font-size: 13px; }
    .selector-area {
      display: flex; align-items: center; margin-top: 20px; gap: 20px; flex-wrap: wrap;
    }
    .total-info { background: #e2e8f0; padding: 8px 22px; border-radius: 40px; font-weight: 500; }
    .action-btn {
      background: #0f172a; color: white; border: none; padding: 10px 28px;
      border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer;
    }
    .action-btn.secondary { background: white; color: #0f172a; border: 1.5px solid #cbd5e1; }
    .warning-msg { color: #b45309; background: #fffbeb; padding: 6px 16px; border-radius: 30px; }
    .exam-header { display: flex; justify-content: space-between; margin: 20px 0 16px; }
    .score-badge {
      background: #1e293b; color: white; padding: 8px 24px; border-radius: 40px;
      font-weight: 600; font-size: 22px;
    }
    .questions-container { background: #ffffff; border-radius: 24px; padding: 8px 0; }
    .question-card {
      background: #fafcff; border-radius: 20px; padding: 20px 24px;
      margin-bottom: 18px; border: 1px solid #e9eef4;
    }
    .q-title { display: flex; gap: 12px; margin-bottom: 16px; }
    .q-num { font-weight: 700; color: #2563eb; background: #e1effe; padding: 2px 14px; border-radius: 30px; }
    .q-text { font-weight: 550; margin-bottom: 16px; font-size: 17px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-item {
      display: flex; align-items: center; gap: 12px; padding: 6px 10px;
      border-radius: 14px; background: white; border: 1px solid #eef2f6;
    }
    .confirm-btn {
      margin-top: 12px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
    }
    .confirm-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }
    .feedback {
      margin-top: 14px; padding: 10px 14px; border-radius: 16px;
      background: #f1f5f9; border-left: 5px solid;
    }
    .correct-feedback { border-left-color: #10b981; background: #ecfdf5; }
    .wrong-feedback { border-left-color: #ef4444; background: #fef2f2; }

    .page-btn {
      background: white; border: 1.5px solid #cbd5e1; border-radius: 40px;
      padding: 8px 18px; cursor: pointer;
    }
    .page-btn.active { background: #0f172a; color: white; }
    .submit-area { display: flex; justify-content: flex-end; margin-top: 20px; }
    .big-submit {
      background: #0f172a; color: white; padding: 16px 48px; font-size: 20px;
      border-radius: 60px; border: none; cursor: pointer;
    }
    .footer-note { margin-top: 16px; color: #62748c; }
    .hidden { display: none !important; }
    .locked-tip { font-size: 14px; color: #2563eb; margin-left: 20px; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- 口令验证 -->
  <div id="authSection" class="auth-overlay">
    <div class="auth-box">
      <h2>🔐 考试准入</h2>
      <input type="password" id="tokenInput" class="token-input" placeholder="请输入访问口令" autocomplete="off">
      <button class="auth-btn" id="authBtn">验证进入</button>
      <div class="hint-token">如需访问，请联系管理员获取口令</div>
    </div>
  </div>

  <!-- 主系统 -->
  <div id="mainSection" class="main-panel hidden">
    <div class="top-bar">
      <div style="display: flex; align-items: center;">
        <h1>📚 四库合一 · 双模考试 <span class="badge">50题/100分</span></h1>
        <div class="mode-switch">
          <button class="mode-btn active" id="practiceModeBtn">📝 练习模式</button>
          <button class="mode-btn" id="examModeBtn">📋 模拟模式</button>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">🚪 退出登录</button>
    </div>

    <!-- 题库管理 -->
    <div class="suite-manager">
      <div class="suite-title">
        <span>🗂️ 四套题库 (内嵌Word操作题)</span>
        <span style="margin-left:auto; font-size:14px;">💡 可上传覆盖</span>
      </div>
      <div class="suite-grid" id="suiteUploadGrid"></div>
      <div class="selector-area">
        <span class="total-info" id="totalQuestionsInfo">📊 总题数: 计算中...</span>
        <button class="action-btn" id="refreshExamBtn">🔄 重新抽题</button>
        <button class="action-btn secondary" id="resetToEmbeddedBtn">📌 恢复内嵌题库</button>
        <button class="action-btn secondary" id="clearAllSuitesBtn">🧹 清空题库</button>
        <span id="globalHint" class="warning-msg"></span>
      </div>
    </div>

    <!-- 考试区域 -->
    <div id="examArea">
      <div class="exam-header">
        <div><span style="font-weight:600;">📝 当前试卷</span> <span id="examMeta">未抽题</span></div>
        <div class="score-badge" id="scoreDisplay">-- 分</div>
      </div>
      <div id="questionsContainer" class="questions-container">
        <div style="padding:40px; text-align:center; color:#64748b;">点击「重新抽题」开始</div>
      </div>
      <div id="paginationContainer" class="pagination"></div>
      <div class="submit-area">
        <button class="big-submit" id="submitExamBtn">✅ 提交试卷</button>
        <span class="locked-tip" id="lockedHint"></span>
      </div>
      <div class="footer-note">
        <span id="modeHint">📝 练习模式：单选/判断选完即判；多选题需点击「确认答案」</span>
      </div>
    </div>
  </div>
</div>

    const EMBEDDED_SUITE_4 = [];

    // 状态
    let isAuth = false;
    let suites = [[], [], [], []];
    let currentExamQuestions = [];
    let userAnswers = [];
    let isSubmitted = false;
    let currentPage = 1;
    let practiceMode = true;

    // DOM
    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');
    const tokenInput = document.getElementById('tokenInput');
    const authBtn = document.getElementById('authBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const practiceModeBtn = document.getElementById('practiceModeBtn');
    const examModeBtn = document.getElementById('examModeBtn');
    const suiteUploadGrid = document.getElementById('suiteUploadGrid');
    const refreshExamBtn = document.getElementById('refreshExamBtn');
    const resetToEmbeddedBtn = document.getElementById('resetToEmbeddedBtn');
    const clearAllSuitesBtn = document.getElementById('clearAllSuitesBtn');
    const questionsContainer = document.getElementById('questionsContainer');
    const paginationContainer = document.getElementById('paginationContainer');
    const submitExamBtn = document.getElementById('submitExamBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const examMeta = document.getElementById('examMeta');
    const globalHint = document.getElementById('globalHint');
    const totalQuestionsInfo = document.getElementById('totalQuestionsInfo');
    const lockedHint = document.getElementById('lockedHint');
    const modeHint = document.getElementById('modeHint');

    // 初始化
    function loadInitialSuites() {
      for (let i=0; i<4; i++) {
        const stored = localStorage.getItem(`exam_suite_${i}`);
        if (stored) suites[i] = JSON.parse(stored);
        else {
          if (i===0) suites[i] = EMBEDDED_SUITE_1.slice();
          else if (i===1) suites[i] = EMBEDDED_SUITE_2.slice();
          else if (i===2) suites[i] = EMBEDDED_SUITE_3.slice();
          else suites[i] = EMBEDDED_SUITE_4.slice();
        }
      }
      for (let i=0; i<4; i++) localStorage.setItem(`exam_suite_${i}`, JSON.stringify(suites[i]));
      renderSuiteUploaders();
      updateTotalInfo();
    }

    function resetToEmbedded() {
      if (!confirm('恢复内嵌题库将覆盖当前所有题库，确定吗？')) return;
      suites[0] = EMBEDDED_SUITE_1.slice();
      suites[1] = EMBEDDED_SUITE_2.slice();
      suites[2] = EMBEDDED_SUITE_3.slice();
      suites[3] = EMBEDDED_SUITE_4.slice();
      for (let i=0; i<4; i++) localStorage.setItem(`exam_suite_${i}`, JSON.stringify(suites[i]));
      renderSuiteUploaders(); updateTotalInfo();
      resetExamState();
    }

    function getTotalQuestionCount() { return suites.reduce((s,a)=>s+a.length,0); }
    function updateTotalInfo() {
      const total = getTotalQuestionCount();
      totalQuestionsInfo.textContent = `📊 总题数: ${total} 题`;
      globalHint.textContent = total < TOTAL_QUESTIONS ? `⚠️ 总题库仅 ${total} 题，不足50题` : `✅ 总题库充足 (${total}题)`;
    }

    function renderSuiteUploaders() {
      let html = '';
      for (let i=0; i<4; i++) {
        const count = suites[i].length;
        html += `<div class="suite-card"><div class="suite-label">📁 套题 ${i+1} <span class="count-badge">${count} 题</span></div>
          <label class="upload-btn" for="fileUpload${i}">📤 上传 JSON</label>
          <input type="file" id="fileUpload${i}" accept=".json,application/json" style="display:none;">
          <div class="file-info" id="fileInfo${i}"></div></div>`;
      }
      suiteUploadGrid.innerHTML = html;
      for (let i=0; i<4; i++) {
        const fileInput = document.getElementById(`fileUpload${i}`);
        const infoSpan = document.getElementById(`fileInfo${i}`);
        fileInput.previousElementSibling.addEventListener('click', ()=>fileInput.click());
        fileInput.addEventListener('change', (e)=>{
          const file = fileInput.files[0]; if(!file) return;
          const reader = new FileReader();
          reader.onload = (ev)=>{
            try {
              const json = JSON.parse(ev.target.result);
              if (!Array.isArray(json)) throw new Error('需为数组');
              suites[i] = json;
              localStorage.setItem(`exam_suite_${i}`, JSON.stringify(json));
              renderSuiteUploaders(); updateTotalInfo();
              infoSpan.textContent = `✅ 已加载 ${json.length} 题`;
            } catch(err) { alert('解析失败: '+err.message); }
            fileInput.value = '';
          };
          reader.readAsText(file);
        });
      }
    }

    function resetExamState() {
      currentExamQuestions = [];
      userAnswers = [];
      isSubmitted = false;
      currentPage = 1;
      scoreDisplay.textContent = '-- 分';
      lockedHint.textContent = '';
      renderQuestions();
    }

    function drawRandomQuestions() {
      const all = suites.flat();
      if (all.length < TOTAL_QUESTIONS) { alert(`总题库仅 ${all.length} 题`); return false; }
      const shuffled = [...all];
      for (let i=shuffled.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      currentExamQuestions = shuffled.slice(0, TOTAL_QUESTIONS);
      userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
      isSubmitted = false;
      lockedHint.textContent = '';
      currentPage = 1;
      examMeta.textContent = `从 ${all.length} 题中抽取50题`;
      return true;
    }

    function isAnswerCorrect(q, ans) {
      if (ans === null || ans === undefined) return false;
      const correct = q.answer;
      if (q.type === 'single' || q.type === 'judge') return ans === correct;
      else {
        if (!Array.isArray(ans)) return false;
        const correctArr = Array.isArray(correct) ? correct : [correct];
        if (ans.length !== correctArr.length) return false;
        return correctArr.every(v => ans.includes(v));
      }
    }

    function getCorrectAnswerStr(q) {
      const ans = q.answer, opts = q.options;
      if (q.type === 'multiple') {
        const arr = Array.isArray(ans) ? ans : [ans];
        return arr.map(idx => `${String.fromCharCode(65+idx)}. ${opts[idx]}`).join(' 、 ');
      } else return `${String.fromCharCode(65+ans)}. ${opts[ans]}`;
    }

    function computeTotalScore() {
      if (!currentExamQuestions.length) return 0;
      let total = 0;
      for (let i=0; i<currentExamQuestions.length; i++) {
        if (isAnswerCorrect(currentExamQuestions[i], userAnswers[i])) total += POINTS_PER_QUESTION;
      }
      return total;
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = `${computeTotalScore()} 分`;
    }

    function isQuestionLocked(qIndex) {
      if (practiceMode) {
        const ans = userAnswers[qIndex];
        if (currentExamQuestions[qIndex].type === 'multiple') {
          return Array.isArray(ans) && ans.length > 0;
        } else {
          return ans !== null;
        }
      } else {
        return isSubmitted;
      }
    }

    // 多选题确认处理
    function confirmMultipleAnswer(qIndex) {
      if (!practiceMode || isSubmitted) return;
      const ans = userAnswers[qIndex];
      if (!Array.isArray(ans) || ans.length === 0) {
        alert('请至少选择一个选项');
        return;
      }
      // 锁定已通过userAnswers存在而生效，只需重绘
      renderQuestions();
      updateScoreDisplay();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function renderQuestions() {
      if (!currentExamQuestions.length) {
        questionsContainer.innerHTML = '<div style="padding:40px; text-align:center;">暂无试卷，点击「重新抽题」</div>';
        paginationContainer.innerHTML = '';
        return;
      }
      const totalPages = Math.ceil(TOTAL_QUESTIONS / QUESTIONS_PER_PAGE);
      const start = (currentPage-1)*QUESTIONS_PER_PAGE;
      const end = Math.min(start+QUESTIONS_PER_PAGE, TOTAL_QUESTIONS);
      const pageQuestions = currentExamQuestions.slice(start, end);
      let html = '';
      for (let i=0; i<pageQuestions.length; i++) {
        const qIndex = start + i;
        const q = pageQuestions[i];
        const type = q.type;
        const userAns = userAnswers[qIndex];
        const opts = q.options || [];
        const locked = isQuestionLocked(qIndex);

        let optionsHtml = '';
        if (type === 'single' || type === 'judge') {
          optionsHtml = opts.map((opt, optIdx) => {
            const checked = (userAns !== null && userAns === optIdx) ? 'checked' : '';
            const disabled = locked ? 'disabled' : '';
            return `<div class="option-item"><input type="radio" name="q${qIndex}" value="${optIdx}" ${checked} ${disabled} data-qindex="${qIndex}"> <span>${String.fromCharCode(65+optIdx)}. ${opt}</span></div>`;
          }).join('');
        } else {
          const selectedArr = Array.isArray(userAns) ? userAns : [];
          optionsHtml = opts.map((opt, optIdx) => {
            const checked = selectedArr.includes(optIdx) ? 'checked' : '';
            const disabled = locked ? 'disabled' : '';
            return `<div class="option-item"><input type="checkbox" name="q${qIndex}" value="${optIdx}" ${checked} ${disabled} data-qindex="${qIndex}"> <span>${String.fromCharCode(65+optIdx)}. ${opt}</span></div>`;
          }).join('');
        }

        // 反馈显示
        let feedbackHtml = '';
        const showFeedback = (practiceMode && locked) || (!practiceMode && isSubmitted);
        if (showFeedback) {
          const correct = isAnswerCorrect(q, userAns);
          const correctStr = getCorrectAnswerStr(q);
          feedbackHtml = correct 
            ? `<div class="feedback correct-feedback">✅ 正确 +2分</div>` 
            : `<div class="feedback wrong-feedback">❌ 错误。正确答案: ${correctStr}</div>`;
        }

        // 练习模式多选题确认按钮
        let confirmBtnHtml = '';
        if (practiceMode && type === 'multiple' && !locked) {
          confirmBtnHtml = `<button class="confirm-btn" data-confirm-qindex="${qIndex}">✅ 确认答案</button>`;
        }

        html += `<div class="question-card">
          <div class="q-title"><span class="q-num">第 ${qIndex+1} 题</span><span>${type==='single'?'【单选】':(type==='judge'?'【判断】':'【多选】')}</span></div>
          <div class="q-text">${q.question}</div>
          <div class="options">${optionsHtml}</div>
          ${confirmBtnHtml}
          ${feedbackHtml}
        </div>`;
      }
      questionsContainer.innerHTML = html;

      // 绑定事件
      // 单选/判断 change：练习模式立即锁定，模拟模式只存储
      document.querySelectorAll('input[type=radio][data-qindex]').forEach(inp => {
        inp.addEventListener('change', function() {
          const qIdx = parseInt(this.dataset.qindex);
          if (isQuestionLocked(qIdx)) return;
          const radio = document.querySelector(`input[name="q${qIdx}"]:checked`);
          userAnswers[qIdx] = radio ? parseInt(radio.value) : null;
          if (practiceMode) {
            // 练习模式单选/判断立即锁定并重绘
            renderQuestions();
            updateScoreDisplay();
          } else {
            // 模拟模式仅存储，不重绘（但需要更新视图？可以局部更新或直接重绘）
            renderQuestions();
          }
        });
      });

      // 多选题 checkbox change：只更新数组，不锁定
      document.querySelectorAll('input[type=checkbox][data-qindex]').forEach(inp => {
        inp.addEventListener('change', function() {
          const qIdx = parseInt(this.dataset.qindex);
          if (isQuestionLocked(qIdx)) return;
          const checks = document.querySelectorAll(`input[name="q${qIdx}"]:checked`);
          userAnswers[qIdx] = Array.from(checks).map(cb => parseInt(cb.value));
          if (!practiceMode) {
            // 模拟模式重绘保持界面同步（但不锁定）
            renderQuestions();
          }
          // 练习模式：不重绘，等待确认按钮
        });
      });

      // 确认按钮事件
      document.querySelectorAll('.confirm-btn[data-confirm-qindex]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const qIdx = parseInt(btn.dataset.confirmQindex);
          confirmMultipleAnswer(qIdx);
        });
      });

      renderPagination(totalPages);
      updateScoreDisplay();
    }

    function renderPagination(totalPages) {
      if (totalPages<=1) { paginationContainer.innerHTML = ''; return; }
      let btns = '';
      for (let i=1; i<=totalPages; i++) {
        btns += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
      }
      paginationContainer.innerHTML = btns;
      document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          renderQuestions();
          window.scrollTo({top:0, behavior:'smooth'});
        });
      });
    }

    function handleSubmit() {
      if (!currentExamQuestions.length) { alert('没有试卷'); return; }
      if (practiceMode) {
        alert('练习模式题目已自动锁定，无需提交。如需模拟考试请切换到“模拟模式”。');
        return;
      }
      if (isSubmitted) { alert('已经提交过了'); return; }
      isSubmitted = true;
      lockedHint.textContent = '🔒 试卷已提交';
      renderQuestions();
      updateScoreDisplay();
    }

    function refreshExam() {
      if (getTotalQuestionCount() < TOTAL_QUESTIONS) { alert('总题库不足50题'); return; }
      if (drawRandomQuestions()) {
        renderQuestions();
        updateScoreDisplay();
        lockedHint.textContent = '';
        isSubmitted = false;
      }
    }

    function setPracticeMode(enabled) {
      if (practiceMode === enabled) return;
      if (currentExamQuestions.length > 0) {
        if (!confirm('切换模式将重置当前答题进度，确定吗？')) return;
      }
      practiceMode = enabled;
      practiceModeBtn.classList.toggle('active', practiceMode);
      examModeBtn.classList.toggle('active', !practiceMode);
      modeHint.innerHTML = practiceMode ? '📝 练习模式：单选/判断选完即判；多选题需点击「确认答案」' : '📋 模拟模式：自由作答，统一提交';
      if (currentExamQuestions.length) {
        userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        isSubmitted = false;
        lockedHint.textContent = '';
        renderQuestions();
        updateScoreDisplay();
      }
    }

    function verifyToken() {
      if (tokenInput.value.trim() === ACCESS_TOKEN) {
        isAuth = true;
        authSection.classList.add('hidden');
        mainSection.classList.remove('hidden');
        loadInitialSuites();
        if (getTotalQuestionCount() >= TOTAL_QUESTIONS) refreshExam();
        else questionsContainer.innerHTML = '<div style="padding:40px;">内嵌题库已加载，但总题数不足50</div>';
      } else alert('口令错误');
    }

    function logout() {
      isAuth = false;
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
      tokenInput.value = '';
    }

    function clearAllSuites() {
      if (!confirm('清空所有题库？')) return;
      for (let i=0; i<4; i++) { suites[i] = []; localStorage.removeItem(`exam_suite_${i}`); }
      renderSuiteUploaders(); updateTotalInfo();
      resetExamState();
    }

    authBtn.addEventListener('click', verifyToken);
    tokenInput.addEventListener('keypress', e => { if(e.key==='Enter') verifyToken(); });
    logoutBtn.addEventListener('click', logout);
    practiceModeBtn.addEventListener('click', ()=>setPracticeMode(true));
    examModeBtn.addEventListener('click', ()=>setPracticeMode(false));
    refreshExamBtn.addEventListener('click', refreshExam);
    resetToEmbeddedBtn.addEventListener('click', resetToEmbedded);
    clearAllSuitesBtn.addEventListener('click', clearAllSuites);
    submitExamBtn.addEventListener('click', handleSubmit);

    window.addEventListener('load', ()=>{
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
    });
  })();
</script>
</body>
</html>
